version: 2
updates:
  # Backend — Maven
  - package-ecosystem: "maven"
    directory: "/family-finance-api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "deps(api)"

  # Frontend — npm
  - package-ecosystem: "npm"
    directory: "/family-finance-front"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "deps(front)"
    ignore:
      # TS 6 major: typescript-eslint peer talabi <6.0.0 — ekotizim qo'llagach olib tashlansin
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(ci)"
