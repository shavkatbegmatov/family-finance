name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/shavkatbegmatov/family-finance

jobs:
  # ── CI: Sir sizishini skanlash (PR diff bo'yicha) ──
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── CI: Frontend lint + test + build ──
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family-finance-front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: family-finance-front/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test          # Vitest toza-mantiq testlari (qizil test merge'ni bloklaydi)
      - run: npm run build

  # ── CI: Backend compile + unit tests ──
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: family-finance-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      # `clean test` kompilyatsiya + toza-mantiq birlik testlarini ishga tushiradi.
      # Qizil test merge'ni bloklaydi (Docker image build'i alohida -DskipTests bilan).
      - run: chmod +x mvnw && ./mvnw clean test -q

  # ── CD: Build Docker images + push to GHCR ──
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: ./family-finance-api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:latest
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./family-finance-front
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-front:latest
            ${{ env.IMAGE_PREFIX }}-front:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            VITE_IMGBB_API_KEY=${{ secrets.VITE_IMGBB_API_KEY }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

  # ── CD: Trigger Coolify deploy ──
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy backend
        run: |
          curl -f -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            --max-time 30

      - name: Deploy frontend
        run: |
          curl -f -X GET "${{ secrets.COOLIFY_FRONTEND_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            --max-time 30

  # ── CD: Deploy'dan keyin prod sog'ligini tekshirish ──
  # Coolify webhook'ni qabul qilishi deploy muvaffaqiyat DEGANI EMAS — konteyner
  # haqiqatda ko'tarilganini bu job tekshiradi. Backend VA frontend ikkalasi ham
  # 200 bo'lishi shart (2026-06-16 frontend 503 jim outage'idan keyin qo'shildi).
  verify:
    name: Verify Deploy
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Health-check backend + frontend
        run: |
          echo "Coolify rollout uchun kutish (120s)..."
          sleep 120
          api=000; front=000
          for i in $(seq 1 24); do
            api=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://api.family-finance.uz/api/actuator/health || echo 000)
            front=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://family-finance.uz || echo 000)
            echo "urinish $i: api=$api front=$front"
            if [ "$api" = "200" ] && [ "$front" = "200" ]; then
              echo "Prod sog'lom: api=200 front=200"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Deploy verify FAILED — api=$api front=$front (prod tiklanmadi)"
          exit 1
