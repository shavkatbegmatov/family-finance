server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # API proxy — FALLBACK only (docker-compose single-stack, where the SPA is
    # built WITHOUT VITE_API_BASE_URL). The app then calls the relative "/api"
    # and nginx forwards it to the "backend" service on the same Docker network.
    #
    # PRODUCTION does NOT use this block: the prod build bakes in
    #   VITE_API_BASE_URL=https://api.family-finance.uz/api
    # so the browser talks to the backend's own domain directly. Hence hitting
    # https://family-finance.uz/api in prod returns 502 ("backend" host doesn't
    # exist on the frontend's network) — this is expected/unused, NOT an outage.
    #
    # resolver = resolve "backend" at request time (not at startup), so nginx
    # still boots when the "backend" host is absent (standalone/separate deploy).
    location /api {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend http://backend:8098;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
