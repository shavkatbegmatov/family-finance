spring:
  application:
    name: family-finance-api

  profiles:
    active: dev

  # Telegram long-polling (25s blok) cleanup cron'ni bloklamasligi uchun 2 scheduler thread.
  task:
    scheduling:
      pool:
        size: 2

  # Timezone - Toshkent vaqti
  jackson:
    time-zone: Asia/Tashkent
    date-format: yyyy-MM-dd HH:mm:ss

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 16
        jdbc:
          time_zone: Asia/Tashkent

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8098
  servlet:
    context-path: /api

# JWT Configuration
# DIQQAT: default YO'Q — JWT_SECRET env o'rnatilmasa ilova ishga tushmaydi
# (fail-fast). Lokal dev uchun application-dev.yml'da dev-only fallback bor.
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000 # 1 hour in milliseconds
  refresh-expiration: 86400000 # 1 day

# Swagger/OpenAPI (prod profilda butunlay o'chiriladi — application-prod.yml)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Actuator — faqat health ochiq (env/beans/heapdump kabi endpoint'lar sir
# va konfiguratsiya sizdirishi mumkin; aniq ro'yxat kelajak xatolaridan himoya)
management:
  endpoints:
    web:
      exposure:
        include: health

# Super Admin seeder — boshlang'ich parol (env'dan). O'rnatilmasa 'superadmin'
# akkaunti yaratilmaydi (SuperAdminSeeder no-op). Prod'da: SUPER_ADMIN_INITIAL_PASSWORD.
superadmin:
  initial-password: ${SUPER_ADMIN_INITIAL_PASSWORD:}

# Card Encryption — default YO'Q (fail-fast); dev fallback application-dev.yml'da
app:
  card-encryption:
    key: ${CARD_ENCRYPTION_KEY}
  # Telegram bot (deep-link auth, Blok B). enabled=false bo'lsa long-polling o'chiq
  # (token yo'q dev/prod'da xavfsiz default). Prod'da: TELEGRAM_ENABLED=true + TELEGRAM_BOT_TOKEN.
  telegram:
    enabled: ${TELEGRAM_ENABLED:false}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:FamilyFinanceAppBot}

# Logging
logging:
  level:
    root: INFO
    uz.familyfinance: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web.access: DEBUG
    org.springframework.security.access: DEBUG
