spring:
  datasource:
    # localhost - Windows/IntelliJ uchun, 172.17.0.1 - WSL uchun
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:family_finance_db}?currentSchema=${DB_SCHEMA:public}
    username: ${DB_USERNAME:family_finance_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:public}

  flyway:
    create-schemas: true
    default-schema: ${DB_SCHEMA:public}
    schemas: ${DB_SCHEMA:public}

  # Vault va Cloud tekshiruvlarini dev muhitda o'chirish
  cloud:
    vault:
      enabled: false
    compatibility-verifier:
      enabled: false

logging:
  level:
    uz.familyfinance: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
